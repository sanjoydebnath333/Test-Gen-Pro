<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Wrong Answer Feedback</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #6b73ff, #000dff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Baloo 2', cursive;
      overflow-x: hidden;
    }

    .feedback-modal {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 36px;
      padding: 32px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      position: relative;
      animation: modalPop 0.5s ease;
    }

    @keyframes modalPop {
      0% {
        transform: scale(0.7);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .top-badge {
      width: 90px;
      height: 90px;
      background: #fff3f3;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: -70px auto 15px;
      box-shadow: 0 10px 30px rgba(255, 99, 99, 0.25);
      font-size: 42px;
      animation: floaty 2s infinite ease-in-out;
    }

    @keyframes floaty {
      0%,100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    .title {
      font-size: 42px;
      font-weight: 700;
      text-align: center;
      color: #ff5d5d;
      line-height: 1.2;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 20px;
      margin-bottom: 24px;
    }

    .progress-box {
      background: #f5f7ff;
      border-radius: 18px;
      padding: 14px 18px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }

    .question-card {
      border: 3px dashed #dbe1ff;
      border-radius: 24px;
      padding: 26px;
      text-align: center;
      margin-bottom: 22px;
      background: #fafbff;
    }

    .question-label {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8891b5;
      font-weight: 700;
    }

    .scramble-word {
      font-size: 46px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #222;
      margin-top: 10px;
    }

    .arrow {
      font-size: 32px;
      margin: 8px 0;
    }

    .correct-word {
      font-size: 50px;
      font-weight: 700;
      color: #19a463;
      letter-spacing: 4px;
      animation: glow 1.4s infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 0px rgba(25,164,99,0.3);
      }
      to {
        text-shadow: 0 0 18px rgba(25,164,99,0.6);
      }
    }

    .answer-card {
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 18px;
      transition: transform 0.2s ease;
    }

    .answer-card:hover {
      transform: translateY(-2px);
    }

    .wrong-card {
      background: #fff1f1;
      border: 2px solid #ffb8b8;
    }

    .correct-card {
      background: #effff5;
      border: 2px solid #8de2ae;
    }

    .answer-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .wrong-icon {
      background: #ffdddd;
    }

    .correct-icon {
      background: #d9ffe8;
    }

    .answer-label {
      font-size: 14px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .answer-text {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }

    .tip-box {
      background: #fff7db;
      border: 2px solid #ffe08a;
      border-radius: 22px;
      padding: 18px 20px;
      margin-bottom: 24px;
      display: flex;
      gap: 14px;
      align-items: start;
    }

    .tip-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .tip-title {
      font-size: 16px;
      font-weight: 700;
      color: #8a5d00;
    }

    .tip-text {
      font-size: 18px;
      color: #6b5b2d;
      line-height: 1.4;
    }

    .next-btn {
      width: 100%;
      border: none;
      border-radius: 24px;
      background: linear-gradient(135deg, #29b95f, #1d964b);
      color: white;
      padding: 18px;
      font-size: 28px;
      font-weight: 700;
      box-shadow: 0 10px 0 #14833d;
      transition: all 0.2s ease;
    }

    .next-btn:hover {
      transform: translateY(-3px);
    }

    .next-btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #14833d;
    }

    .xp-badge {
      background: #ffe76a;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      color: #5d4b00;
    }

    @media (max-width: 576px) {
      .feedback-modal {
        padding: 24px 18px;
        border-radius: 28px;
      }

      .title {
        font-size: 34px;
      }

      .scramble-word,
      .correct-word {
        font-size: 36px;
      }

      .answer-text {
        font-size: 26px;
      }

      .next-btn {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="feedback-modal">

    <!-- Floating Emoji -->
    <div class="top-badge">
      😅
    </div>

    <!-- Heading -->
    <h1 class="title">Oops! So Close</h1>
    <p class="subtitle">
      You almost solved the word puzzle!
    </p>

    <!-- Progress -->
    <div class="progress-box">
      <div>Question 4 of 10 ⭐⭐⭐</div>
      <div class="xp-badge">+5 XP</div>
    </div>

    <!-- Question -->
    <div class="question-card">
      <div class="question-label">Unscramble This Word</div>

      <div class="scramble-word">
        BAGGARE
      </div>

      <div class="arrow">⬇️</div>

      <div class="correct-word">
        GARBAGE
      </div>
    </div>

    <!-- Wrong Answer -->
    <div class="answer-card wrong-card">

      <div class="answer-icon wrong-icon">
        ❌
      </div>

      <div>
        <div class="answer-label text-danger">
          Your Answer
        </div>

        <div class="answer-text text-danger">
          GIRBAGE
        </div>
      </div>
    </div>

    <!-- Correct Answer -->
    <div class="answer-card correct-card">

      <div class="answer-icon correct-icon">
        💡
      </div>

      <div>
        <div class="answer-label text-success">
          Correct Answer
        </div>

        <div class="answer-text text-success">
          GARBAGE
        </div>
      </div>
    </div>

    <!-- Learning Tip -->
    <div class="tip-box">

      <div class="tip-icon">
        🧠
      </div>

      <div>
        <div class="tip-title">
          Smart Tip
        </div>

        <div class="tip-text">
          Try finding common starting sounds like <b>GAR</b> first. Then match the remaining letters.
        </div>
      </div>
    </div>

    <!-- CTA -->
    <button class="next-btn">
      🚀 Next Challenge
    </button>

  </div>

</body>
</html>
